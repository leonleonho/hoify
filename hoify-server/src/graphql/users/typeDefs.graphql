type User {
  id: ID!
  email: String!
  firstName: String!
  lastName: String!
  role: String!
  isActive: Boolean!
  verifiedAt: String
  createdAt: String!
  updatedAt: String!
}

input CreateUserInput {
  email: String!
  password: String!
  firstName: String!
  lastName: String!
}

input UpdateUserInput {
  email: String
  firstName: String
  lastName: String
}

type Query {
  users: [User!]!
  user(id: ID!): User
}

type Mutation {
  createUser(input: CreateUserInput!): User!
  updateUser(id: ID!, input: UpdateUserInput!): User
  deleteUser(id: ID!): Boolean!
}