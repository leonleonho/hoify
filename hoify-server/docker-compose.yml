services:
  postgres:
    image: postgres:16-alpine
    container_name: hoify-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hoify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hoify_dev}
      POSTGRES_DB: ${POSTGRES_DB:-hoify}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hoify} -d ${POSTGRES_DB:-hoify}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hoify-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  slskd:
    image: slskd/slskd:latest
    container_name: hoify-slskd
    restart: unless-stopped
    ports:
      - "${SLSKD_PORT:-5030}:5030"
    volumes:
      - slskd_data:/app/.slskd
      - ${SLSKD_DOWNLOAD_DIR:-./ingest}:/downloads:rw
      - ./slskd.yml:/app/slskd.yml:ro
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  slskd_data: