query Album($id: ID!) {
  album(id: $id) {
    id
    title
    releaseYear
    coverUrl
    artist {
      id
      name
      imageUrl
    }
    tracks {
      id
      title
      trackArtist
      trackNumber
      duration
      filePath
      liked
      genres {
        id
        name
      }
    }
  }
}
