query Artist($id: ID!) {
  artist(id: $id) {
    id
    name
    imageUrl
    bio
    albums {
      id
      title
      releaseYear
      coverUrl
      artist {
        id
        name
      }
      tracks {
        id
        title
        trackNumber
        duration
        filePath
        liked
        genres {
          id
          name
        }
      }
    }
  }
}
