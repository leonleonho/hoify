query SearchMusic($query: String!) {
  searchMusic(query: $query) {
    artists {
      id
      name
      imageUrl
    }
    albums {
      id
      title
      releaseYear
      coverUrl
      artist {
        id
        name
      }
    }
    tracks {
      id
      title
      trackArtist
      trackNumber
      duration
      filePath
      liked
      genres {
        id
        name
      }
      createdAt
      updatedAt
      album {
        id
        title
        coverUrl
        createdAt
        updatedAt
        artist {
          id
          name
          createdAt
          updatedAt
        }
      }
    }
    playlists {
      id
      name
      isPublic
      trackCount
    }
  }
}
